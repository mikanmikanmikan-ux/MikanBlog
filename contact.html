<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - My Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-active-nav="contact">

  <div id="site-header"></div>

  <div class="page-header">
    <h1 class="page-header__title">Contact</h1>
    <p class="page-header__subtitle">お問い合わせ</p>
  </div>

  <section class="subpage">
    <div class="subpage__inner">
      <div class="subpage__content">
        <p class="subpage__lead">
          ご質問・ご依頼・ご感想など、お気軽にお問い合わせください。
        </p>
        <div class="contact-box">
          <div class="contact-box__item">
            <span class="contact-box__label">Email</span>
            <a href="mailto:contact@example.com" class="contact-box__value">contact@example.com</a>
          </div>
          <div class="contact-box__item">
            <span class="contact-box__label">返信目安</span>
            <span class="contact-box__value">2〜3営業日以内</span>
          </div>
        </div>
        <p class="subpage__note">
          ※ SNSからのDMでもお問い合わせいただけます。<a href="sns.html">SNSアカウントはこちら</a>
        </p>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
</body>
</html>
