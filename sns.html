<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNSアカウント - My Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-active-nav="sns">

  <div id="site-header"></div>

  <div class="page-header">
    <h1 class="page-header__title">SNSアカウント</h1>
    <p class="page-header__subtitle">Follow Me</p>
  </div>

  <section class="subpage">
    <div class="subpage__inner">
      <div class="subpage__content">
        <p class="subpage__lead">SNSアカウントページは整備中です</p>
        <div class="sns-grid">
          <a href="#" class="sns-card sns-card--twitter">
            <span class="sns-card__icon">𝕏</span>
            <h3>Twitter / X</h3>
            <p>@your_account</p>
          </a>
          <a href="#" class="sns-card sns-card--instagram">
            <span class="sns-card__icon">📷</span>
            <h3>Instagram</h3>
            <p>@your_account</p>
          </a>
          <a href="#" class="sns-card sns-card--github">
            <span class="sns-card__icon">💻</span>
            <h3>GitHub</h3>
            <p>@your_account</p>
          </a>
          <a href="#" class="sns-card sns-card--youtube">
            <span class="sns-card__icon">▶</span>
            <h3>YouTube</h3>
            <p>@your_channel</p>
          </a>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
</body>
</html>
